{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-md px-4 py-16 sm:px-6">
  <div class="rounded-[2rem] border border-white/10 bg-white p-7 text-black shadow-road">
    <div class="text-xs uppercase tracking-[0.26em] text-black/45">Admin</div>
    <h1 class="mt-2 font-display text-3xl font-bold">Prototype access</h1>
    <p class="mt-3 text-sm leading-6 text-black/65">Shared password only. Good enough for tonight. Not a life philosophy.</p>
    {% if error_message %}
    <div class="mt-5 rounded-3xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error_message }}</div>
    {% endif %}
    <form action="/admin/login" method="post" class="mt-6 space-y-4">
      <div>
        <label class="mb-2 block text-sm font-semibold">Password</label>
        <input type="password" name="password" required class="w-full rounded-2xl border border-black/10 px-4 py-3 text-sm">
      </div>
      <button type="submit" class="w-full rounded-full bg-black px-5 py-4 text-sm font-bold text-white">Enter admin</button>
    </form>
  </div>
</section>
{% endblock %}
